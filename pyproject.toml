[project]
name = "brain-mri-qc"
version = "0.0.0"
dependencies = [
    "monai",
    "mriqc-learn",
    "numpy",
    "requests",
    "scikit-learn",
    "torch",
    "torchio",
]

[project.scripts]
create-dataset    = "brain_mri_qc.create_dataset:main"
download-abide-ii = "brain_mri_qc.download_abide_ii:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = [
    "src/brain_mri_qc",
]
