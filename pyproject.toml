[project]
name = "brain-mri-qc"
version = "0.0.0"
dependencies = [
    "numpy",
    "torchio",
]

[project.scripts]
create-dataset = "brain_mri_qc.create_dataset:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = [
    "src/brain_mri_qc",
]
